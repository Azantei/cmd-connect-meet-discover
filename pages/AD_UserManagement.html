<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Users | C.M.D.</title>
    
    <!-- Google Fonts: DM Sans (body text) and Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Admin User Management Stylesheet -->
    <link rel="stylesheet" href="../css/AD_UserManagement.css">
</head>
<body>
    <!-- ========================================
         TOP NAVIGATION BAR
    ======================================== -->
    <nav class="top-navbar">
        <div class="navbar-content">
            <span class="logo"><span class="logo-light">C.M.</span><span class="logo-accent">D.</span></span>
            <div class="nav-links">
                <a href="#explore">Explore</a>
                <a href="#create">Create</a>
                <a href="#profile">Profile</a>
            </div>
            <div class="admin-info">Admin: [Name]</div>
        </div>
    </nav>

    <!-- ========================================
         LEFT SIDEBAR
    ======================================== -->
    <aside class="left-sidebar">
        <nav class="sidebar-nav">
            <a href="#users" class="nav-item active">
                <span>Users</span>
            </a>
            <a href="#escalated" class="nav-item">
                <span>Escalated</span>
            </a>
            <a href="#analytics" class="nav-item">
                <span>Analytics</span>
            </a>
            <a href="#settings" class="nav-item">
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- ========================================
         MAIN CONTENT AREA
    ======================================== -->
    <main class="main-content">
        <!-- Statistics Cards -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">2,847</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Posts</div>
                <div class="stat-value" id="activePosts">391</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Reports</div>
                <div class="stat-value" id="reports">7</div>
            </div>
        </section>

        <!-- Search Bar -->
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name or email" class="search-input">
            <button class="search-btn">Search</button>
        </section>

        <!-- Users Table -->
        <section class="table-section">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>User (name + email)</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be dynamically populated via JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Admin User Management JavaScript -->
    <script src="../js/AD_UserManagement.js"></script>
</body>
</html>
