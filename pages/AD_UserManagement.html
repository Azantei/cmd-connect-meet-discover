<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Users | C.M.D.</title>
    
    <!-- Google Fonts: DM Sans (body text) and Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Admin User Management Stylesheet -->
    <link rel="stylesheet" href="../css/AD_UserManagement.css">
</head>
<body>
    <!-- ========================================
         TOP BAR
         Dashboard title and role indicator
    ======================================== -->
    <header class="admin-topbar">
        <span>System Administrator Dashboard</span>
        <span class="admin-role">System Administrator</span>
    </header>

    <!-- ========================================
         TOP NAVIGATION BAR
    ======================================== -->
    <nav class="top-navbar">
        <div class="navbar-content">
            <span class="logo"><span class="logo-light">C.M.</span><span class="logo-accent">D.</span></span>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="CM_ActivityFeed.html">Explore</a>
                <a href="CM_CreatePost.html">Create</a>
                <a href="CM_Profile.html">Profile</a>
                <a href="index.html#about">About Us</a>
            </div>
            <div class="admin-info">Admin: [Name] <a href="CM_Login.html" style="margin-left: 1rem; color: hsl(20, 90%, 55%); text-decoration: none;">Log Out</a></div>
        </div>
    </nav>

    <!-- ========================================
         LEFT SIDEBAR
    ======================================== -->
    <aside class="left-sidebar">
        <nav class="sidebar-nav">
            <a href="AD_UserManagement.html" class="nav-item active">
                <span>Users</span>
            </a>
            <a href="AD_EscalatedReports.html" class="nav-item">
                <span>Escalated</span>
            </a>
            <a href="AD_Analytics.html" class="nav-item">
                <span>Analytics</span>
            </a>
            <a href="AD_Settings.html" class="nav-item">
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- ========================================
         MAIN CONTENT AREA
    ======================================== -->
    <main class="main-content">
        <!-- Statistics Cards -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">2,847</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Posts</div>
                <div class="stat-value" id="activePosts">391</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Reports</div>
                <div class="stat-value" id="reports">7</div>
            </div>
        </section>

        <!-- Search Bar -->
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name or email" class="search-input">
            <button class="search-btn">Search</button>
        </section>

        <!-- Users Table -->
        <section class="table-section">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>User (name + email)</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be dynamically populated via JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- ========================================
         FOOTER
         Simple footer with branding and copyright
    ======================================== -->
    <footer>
        <div class="container">
            <span class="logo">C.M.D.</span>
            <p>Connect. Meet. Discover. © 2026</p>
        </div>
    </footer>

    <!-- Admin User Management JavaScript -->
    <script src="../js/AD_UserManagement.js"></script>
</body>
</html>
