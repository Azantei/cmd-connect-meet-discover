<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.M.D. - User Profile</title>
    
    <!-- Google Fonts: DM Sans (body text) and Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Other User Profile Stylesheet -->
    <link rel="stylesheet" href="../css/CM_OtherUserProfile.css">
</head>
<body>

    <!-- ========================================
         NAVIGATION BAR
         Fixed header with logo, centered links, and user info
    ======================================== -->
    <nav class="navbar">
        <span class="brand"><span class="brand-light">C.M.</span><span class="brand-accent">D.</span></span>
        <div class="nav-links">
            <a href="CM_ActivityFeed.html">Explore</a>
            <a href="CM_CreatePost.html">Create</a>
            <a href="CM_Profile.html">Profile</a>
            <a href="index.html#about">About Us</a>
        </div>
        <div class="nav-right">
            <span>Alex J.</span>
            <a href="CM_Login.html" style="margin-left: 1rem; color: hsl(20, 90%, 55%); text-decoration: none;">Log Out</a>
        </div>
    </nav>

    <!-- ========================================
         PROFILE HEADER
         Viewed user's info, avatar, stats, and follow button
    ======================================== -->
    <div class="profile-header">
        <div class="profile-left">
            <div class="avatar">?</div>
            <div class="profile-info">
                <div class="profile-name">Other User's Name</div>
                <div class="profile-meta">
                    <span class="meta-link">@username</span>
                    <span class="meta-link">Location</span>
                </div>
                <div class="profile-stats">
                    <div><span class="stat-num">16</span><span class="stat-label">Posts</span></div>
                    <div><span class="stat-num">78</span><span class="stat-label">RSVPs</span></div>
                </div>
            </div>
        </div>
        <button class="btn-report" id="reportBtn" onclick="openReportModal()">
            <span class="report-dot"></span> Report User
        </button>
    </div>

    <!-- Activity Banner -->
    <div class="activity-banner">Activity (public posts only)</div>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section-title">ABOUT (if public)</div>
            <div class="placeholder-lines">Example Bio</div>
            <div class="sidebar-section-title" style="margin-top:20px;">INTERESTS</div>
            <div class="interests-list">
                <span class="interest-tag">Music</span>
                <span class="interest-tag">Sports</span>
                <span class="interest-tag">Tech</span>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="posts-area">
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <!-- Report Modal -->
    <div class="modal-overlay" id="reportModal" style="display:none;">
        <div class="modal">
            <div class="modal-title">Report this user?</div>
            <div class="modal-desc">Please select a reason for reporting this user. Our team will review the report.</div>
            <div class="modal-reasons">
                <label><input type="radio" name="reason"> Spam or misleading content</label>
                <label><input type="radio" name="reason"> Harassment or bullying</label>
                <label><input type="radio" name="reason"> Inappropriate content</label>
                <label><input type="radio" name="reason"> Other</label>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeReportModal()">Cancel</button>
                <button class="btn-submit" onclick="submitReport()">Submit Report</button>
            </div>
        </div>
    </div>

    <script src="../js/CM_OtherUserProfile.js"></script>
</body>
</html>
