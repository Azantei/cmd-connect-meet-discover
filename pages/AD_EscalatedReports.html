<!DOCTYPE html>
<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Admin Escalated Reports Stylesheet -->
    <link rel="stylesheet" href="../css/AD_EscalatedReports.css">
</head>
<body>
    <!-- ========================================
         TOP BAR
         Dashboard title and role indicator
    ======================================== -->
    <header class="admin-topbar">
        <span>System Administrator Dashboard</span>
        <span class="admin-role">System Administrator</span>
    </header>

    <!-- ========================================

    ======================================== -->
    <nav class="top-navbar">
        <div class="navbar-content">
            <a href="index.html" class="logo"><span class="logo-light">C.M.</span><span class="logo-accent">D.</span></a>
            <div class="nav-links">
                <a href="CM_Events.html">Explore</a>
                <a href="CM_CreatePost.html">Create</a>
                <a href="CM_Profile.html">Profile</a>
                <a href="about.html">About Us</a>
            </div>
            <div class="admin-info">Admin: [Name] <a href="CM_Login.html" style="margin-left: 1rem; color: hsl(20, 90%, 55%); text-decoration: none;">Log Out</a></div>
        </div>
    </nav>

    <!-- ========================================
         LEFT SIDEBAR
    ======================================== -->
    <aside class="left-sidebar">
        <nav class="sidebar-nav">
            <a href="AD_UserManagement.html" class="nav-item">

            </a>
            <a href="AD_EscalatedReports.html" class="nav-item active">

            </a>
            <a href="AD_Settings.html" class="nav-item">
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    ======================================== -->
    <main class="main-content">
        <!-- Page Header -->
        <section class="page-header">
            <h1>Escalated Reports</h1>
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter" class="status-filter">
                    <option value="all">All</option>
                    <option value="open">Open</option>
                    <option value="resolved">Resolved</option>
                </select>
            </div>
        </section>

        <!-- Reports List -->
        <section class="reports-list" id="reportsList">
            <!-- Reports will be dynamically populated via JavaScript -->
        </section>
    </main>

    <!-- ========================================
         FOOTER
         Simple footer with branding and copyright
    ======================================== -->
    <footer>
        <div class="container">
            <span class="logo">C.M.D.</span>
            <p>Connect. Meet. Discover. © 2026</p>
        </div>
